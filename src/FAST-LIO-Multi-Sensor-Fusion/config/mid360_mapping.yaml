common:
    # 建图模式：与 mid360.yaml 相同的双雷达配置，但打开 GNSS 紧耦合，
    # 使建出的 PCD 地图与 ENU（东北天）对齐，并保存 ENU 原点供定位模式使用。
    # 按你实际雷达 IP 修改下面三个话题名（与 mid360.yaml 保持一致）
    lid_topic_left:  "/livox/lidar_192_168_1_12"
    lid_topic_right: "/livox/lidar_192_168_1_3"
    imu_topic:  "/livox/imu_192_168_1_12"
    dual_lidar_en: true
    use_wheel: false
    use_gnss: true
    gnss_topic:  "/gps/fix"        # bynav_ros_driver 的 NavSatFix 话题
    time_sync_en: false
    time_offset_lidar_to_imu: 0.0

preprocess:
    lidar_type: 1
    scan_line: 4
    blind: 0.4

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree: 360
    det_range: 100.0
    extrinsic_est_en: false
    extrinsic_T: [ 0.0, 0.0, 0.0 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1 ]

    left_lidar_to_imu: [ 1, 0, 0, -0.011,
                         0, 1, 0, -0.02329,
                         0, 0, 1,  0.04412,
                         0, 0, 0,  1 ]

    right_lidar_to_imu: [  0, 0, 1, 0.30,
                           0, 1, 0, 0.00,
                          -1, 0, 0, 0.10,
                           0, 0, 0, 1 ]

    extrinT_Gnss2IMU: [ 0.0, 0.0, 0.15 ]
    extrinsic_leverarm_en: true

publish:
    path_en: true
    scan_publish_en: true
    dense_publish_en: true
    scan_bodyframe_pub_en: false

pcd_save:
    pcd_save_en: true              # 结束时保存 PCD/scans.pcd 作为先验地图
    interval: -1
